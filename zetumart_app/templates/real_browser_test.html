<!DOCTYPE html>
<html>
<head>
    <title>Real Browser Test</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <h1>Real Browser Authentication Test</h1>
    
    <div id="auth-status">
        <h3>Authentication Status:</h3>
        <p id="status">Checking...</p>
    </div>
    
    <div>
        <h3>Test Edit Functionality:</h3>
        <button onclick="testEdit()">Test Edit Product 33</button>
        <div id="edit-result"></div>
    </div>
    
    <div>
        <h3>Manual Login Test:</h3>
        <button onclick="testLogin()">Test Manual Login</button>
        <div id="login-result"></div>
    </div>
    
    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        function checkAuthStatus() {
            const statusDiv = document.getElementById('status');
            
            // Check if we have session cookies
            const sessionId = getCookie('sessionid');
            const csrfToken = getCookie('csrftoken');
            
            statusDiv.innerHTML = `
                <p>Session ID: ${sessionId ? 'Found' : 'Not found'}</p>
                <p>CSRF Token: ${csrfToken ? 'Found' : 'Not found'}</p>
                <p>Current URL: ${window.location.href}</p>
            `;
            
            // Test API call to check authentication
            fetch('/api/products/33/', {
                credentials: 'same-origin'
            })
            .then(response => {
                if (response.ok) {
                    statusDiv.innerHTML += '<p>✅ API call successful - You are authenticated!</p>';
                } else {
                    statusDiv.innerHTML += `<p>❌ API call failed - Status: ${response.status}</p>`;
                    if (response.status === 403) {
                        statusDiv.innerHTML += '<p>❌ You are NOT authenticated</p>';
                    }
                }
            })
            .catch(error => {
                statusDiv.innerHTML += `<p>❌ Network error: ${error.message}</p>`;
            });
        }
        
        function testEdit() {
            const resultDiv = document.getElementById('edit-result');
            resultDiv.innerHTML = '<h4>Testing Edit Function...</h4>';
            
            // This is the EXACT same function from products.html
            fetch(`/api/products/33/`, {
                credentials: 'same-origin'
            })
                .then(response => {
                    resultDiv.innerHTML += `<p>Response status: ${response.status}</p>`;
                    
                    if (!response.ok) {
                        if (response.status === 403) {
                            throw new Error('403 Unauthorized - Authentication required');
                        } else if (response.status === 401) {
                            throw new Error('401 Unauthorized - Please login');
                        } else {
                            throw new Error(`Network response was not ok: ${response.status}`);
                        }
                    }
                    return response.json();
                })
                .then(data => {
                    resultDiv.innerHTML += '<p>Response data: ' + JSON.stringify(data, null, 2) + '</p>';
                    
                    if (data.success) {
                        const product = data.product;
                        resultDiv.innerHTML += '<h3>✅ SUCCESS: Edit functionality works!</h3>';
                        resultDiv.innerHTML += `<p>Product: ${product.name}</p>`;
                        resultDiv.innerHTML += `<p>Price: ${product.price}</p>`;
                    } else {
                        resultDiv.innerHTML += '<h3>❌ Error: ' + (data.error || 'Unknown error') + '</h3>';
                    }
                })
                .catch(error => {
                    resultDiv.innerHTML += '<h3>❌ CATCH BLOCK ERROR</h3>';
                    resultDiv.innerHTML += '<p>Error: ' + error.message + '</p>';
                    
                    if (error.message.includes('403') || error.message.includes('Unauthorized')) {
                        resultDiv.innerHTML += '<p>🔐 Authentication required. <a href="/login/">Click here to login</a></p>';
                    } else {
                        resultDiv.innerHTML += '<p>This is the exact error you see in the admin dashboard!</p>';
                    }
                });
        }
        
        function testLogin() {
            const resultDiv = document.getElementById('login-result');
            resultDiv.innerHTML = '<h4>Testing Manual Login...</h4>';
            
            // Get CSRF token first
            fetch('/login/')
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const csrfToken = doc.querySelector('input[name="csrfmiddlewaretoken"]')?.value;
                
                if (csrfToken) {
                    resultDiv.innerHTML += '<p>CSRF token found</p>';
                    
                    // Try to login
                    const formData = new FormData();
                    formData.append('username', 'admin');
                    formData.append('password', 'root');
                    formData.append('csrfmiddlewaretoken', csrfToken);
                    
                    return fetch('/login/', {
                        method: 'POST',
                        body: formData,
                        credentials: 'same-origin'
                    });
                } else {
                    throw new Error('CSRF token not found');
                }
            })
            .then(response => {
                resultDiv.innerHTML += `<p>Login status: ${response.status}</p>`;
                if (response.redirected) {
                    resultDiv.innerHTML += `<p>Redirected to: ${response.url}</p>`;
                }
                return response.text();
            })
            .then(html => {
                if (html.includes('admin dashboard') || html.includes('admin_dashboard')) {
                    resultDiv.innerHTML += '<p>✅ Login successful!</p>';
                    // Check auth status again
                    setTimeout(checkAuthStatus, 1000);
                } else {
                    resultDiv.innerHTML += '<p>❌ Login failed</p>';
                }
            })
            .catch(error => {
                resultDiv.innerHTML += '<p>❌ Login error: ' + error.message + '</p>';
            });
        }
        
        // Check auth status when page loads
        window.onload = function() {
            checkAuthStatus();
        };
    </script>
</body>
</html>
