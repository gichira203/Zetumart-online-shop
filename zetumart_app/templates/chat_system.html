{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Live Chat - ZetuMart</title>
    <link href="{% static 'assets/img/favicon.png' %}" rel="icon">
    <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --light-gray: #f8f9fa;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .chat-container {
            max-width: 1200px;
            margin: 0 auto;
            height: calc(100vh - 40px);
            display: flex;
            gap: 20px;
        }

        /* Chat Sidebar */
        .chat-sidebar {
            width: 350px;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .chat-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 12px 12px 0 0;
        }

        .chat-sidebar-header h5 {
            margin: 0;
            font-weight: 600;
        }

        .chat-search {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .chat-search input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            outline: none;
        }

        .chat-search input:focus {
            border-color: var(--primary-color);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 5px;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: var(--light-gray);
            transform: translateX(5px);
        }

        .chat-item.active {
            background: #e3f2fd;
            border-color: var(--primary-color);
        }

        .chat-item.unread {
            background: #fff3cd;
            border-left: 3px solid var(--warning-color);
        }

        .chat-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .chat-item-name {
            font-weight: 600;
            color: #333;
        }

        .chat-item-time {
            font-size: 0.8rem;
            color: #666;
        }

        .chat-item-message {
            color: #666;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .chat-item-status.online {
            background: var(--success-color);
        }

        .chat-item-status.offline {
            background: #ccc;
        }

        /* Main Chat Area */
        .chat-main {
            flex: 1;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success-color);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.customer {
            justify-content: flex-start;
        }

        .message.admin {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
        }

        .message.customer .message-bubble {
            background: white;
            color: #333;
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .message.admin .message-bubble {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            font-size: 0.8rem;
            color: #666;
        }

        .message.admin .message-info {
            justify-content: flex-end;
        }

        .message-text {
            line-height: 1.4;
        }

        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        .typing-indicator {
            display: none;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid var(--border-color);
        }

        .typing-indicator.show {
            display: block;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .chat-input {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: white;
            border-radius: 0 0 12px 12px;
        }

        .chat-input-form {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input-field {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            outline: none;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }

        .chat-input-field:focus {
            border-color: var(--primary-color);
        }

        .chat-send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .chat-send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }

        .chat-send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Quick Replies */
        .quick-replies {
            padding: 10px 20px;
            border-top: 1px solid var(--border-color);
            background: var(--light-gray);
        }

        .quick-reply-btn {
            padding: 8px 16px;
            margin: 5px;
            border: 1px solid var(--primary-color);
            background: white;
            color: var(--primary-color);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .quick-reply-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* Connection Status */
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 1000;
        }

        .connection-status.connected {
            background: var(--success-color);
            color: white;
        }

        .connection-status.disconnected {
            background: var(--danger-color);
            color: white;
        }

        .connection-status.connecting {
            background: var(--warning-color);
            color: #333;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
                height: 100%;
            }

            .chat-sidebar {
                width: 100%;
                height: 300px;
            }

            .chat-main {
                height: calc(100% - 320px);
            }

            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- Connection Status -->
    <div class="connection-status connecting" id="connectionStatus">
        <i class="bi bi-arrow-repeat me-2"></i>Connecting...
    </div>

    <div class="chat-container">
        <!-- Chat Sidebar -->
        <aside class="chat-sidebar">
            <div class="chat-sidebar-header">
                <h5><i class="bi bi-chat-dots me-2"></i>Customer Support</h5>
                <div class="badge bg-success" id="activeChatsCount">0 Active</div>
            </div>
            
            <div class="chat-search">
                <input type="text" placeholder="Search conversations..." id="chatSearch">
            </div>
            
            <div class="chat-list" id="chatList">
                <!-- Chat items will be populated here -->
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">
                    <i class="bi bi-chat-dots"></i>
                </div>
                <h5>Select a conversation</h5>
                <p>Choose a conversation from the sidebar to start chatting</p>
            </div>

            <div id="chatInterface" style="display: none; height: 100%; display: flex; flex-direction: column;">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <div class="status-dot"></div>
                        <div>
                            <div id="chatCustomerName">Customer</div>
                            <div class="chat-header-status">
                                <span id="chatCustomerEmail">email@example.com</span>
                            </div>
                        </div>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-light" onclick="transferChat()">
                            <i class="bi bi-arrow-right-left"></i> Transfer
                        </button>
                        <button class="btn btn-sm btn-light" onclick="endChat()">
                            <i class="bi bi-x-circle"></i> End Chat
                        </button>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <!-- Messages will be populated here -->
                </div>

                <div class="typing-indicator" id="typingIndicator">
                    <div class="typing-dots">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                    <span class="ms-2">Customer is typing...</span>
                </div>

                <div class="quick-replies">
                    <button class="quick-reply-btn" onclick="sendQuickReply('Hello! How can I help you today?')">Hello!</button>
                    <button class="quick-reply-btn" onclick="sendQuickReply('Thank you for contacting ZetuMart support.')">Thanks</button>
                    <button class="quick-reply-btn" onclick="sendQuickReply('I\'m checking that for you...')">Checking</button>
                    <button class="quick-reply-btn" onclick="sendQuickReply('Is there anything else I can help with?')">Anything else?</button>
                </div>

                <div class="chat-input">
                    <form class="chat-input-form" id="chatForm">
                        <textarea 
                            class="chat-input-field" 
                            id="messageInput" 
                            placeholder="Type your message..."
                            rows="1"
                            maxlength="1000"
                        ></textarea>
                        <button type="submit" class="chat-send-btn" id="sendBtn">
                            <i class="bi bi-send"></i>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <script>
        // Chat System State
        let ws = null;
        let currentChatId = null;
        let currentSessionId = null;
        let chatHistory = {};
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 5;

        // Initialize chat system
        document.addEventListener('DOMContentLoaded', function() {
            initializeWebSocket();
            loadChatList();
            setupEventListeners();
        });

        // Initialize WebSocket connection
        function initializeWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/chat/`;
            
            updateConnectionStatus('connecting');
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = function() {
                    console.log('WebSocket connected');
                    updateConnectionStatus('connected');
                    reconnectAttempts = 0;
                    
                    // Send admin authentication
                    ws.send(JSON.stringify({
                        type: 'admin_auth',
                        user_id: '{{ user.id }}',
                        username: '{{ user.username }}'
                    }));
                };
                
                ws.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                };
                
                ws.onclose = function(event) {
                    console.log('WebSocket disconnected:', event);
                    updateConnectionStatus('disconnected');
                    
                    // Attempt to reconnect
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        setTimeout(initializeWebSocket, 3000 * reconnectAttempts);
                    }
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket error:', error);
                    updateConnectionStatus('disconnected');
                };
                
            } catch (error) {
                console.error('Error creating WebSocket:', error);
                updateConnectionStatus('disconnected');
            }
        }

        // Handle WebSocket messages
        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'new_message':
                    handleNewMessage(data);
                    break;
                case 'chat_list_update':
                    updateChatList(data.chats);
                    break;
                case 'typing_indicator':
                    handleTypingIndicator(data);
                    break;
                case 'chat_status':
                    handleChatStatus(data);
                    break;
                default:
                    console.log('Unknown message type:', data.type);
            }
        }

        // Handle new message
        function handleNewMessage(data) {
            const message = data.message;
            
            // Update chat list
            updateChatListItem(message);
            
            // If this is the current chat, add message to chat
            if (message.session_id === currentSessionId) {
                addMessageToChat(message);
                scrollToBottom();
            }
            
            // Store in history
            if (!chatHistory[message.session_id]) {
                chatHistory[message.session_id] = [];
            }
            chatHistory[message.session_id].push(message);
        }

        // Handle typing indicator
        function handleTypingIndicator(data) {
            if (data.session_id === currentSessionId) {
                const indicator = document.getElementById('typingIndicator');
                if (data.is_typing) {
                    indicator.classList.add('show');
                } else {
                    indicator.classList.remove('show');
                }
            }
        }

        // Handle chat status
        function handleChatStatus(data) {
            updateChatListItemStatus(data);
        }

        // Load chat list
        async function loadChatList() {
            try {
                const response = await fetch('/api/chat/messages/');
                const data = await response.json();
                
                if (data.success) {
                    updateChatList(data.messages);
                    updateActiveChatsCount(data.messages.length);
                }
            } catch (error) {
                console.error('Error loading chat list:', error);
            }
        }

        // Update chat list
        function updateChatList(messages) {
            const chatList = document.getElementById('chatList');
            chatList.innerHTML = '';
            
            // Group messages by session_id
            const sessions = {};
            messages.forEach(message => {
                if (!sessions[message.session_id]) {
                    sessions[message.session_id] = {
                        session_id: message.session_id,
                        customer_name: message.customer_name,
                        customer_email: message.customer_email,
                        last_message: message,
                        unread_count: 0,
                        is_online: false
                    };
                }
                
                // Update last message if this is newer
                if (new Date(message.created_at) > new Date(sessions[message.session_id].last_message.created_at)) {
                    sessions[message.session_id].last_message = message;
                }
                
                // Count unread messages
                if (!message.is_read && message.sender_type === 'customer') {
                    sessions[message.session_id].unread_count++;
                }
            });
            
            // Sort by last message time
            const sortedSessions = Object.values(sessions).sort((a, b) => 
                new Date(b.last_message.created_at) - new Date(a.last_message.created_at)
            );
            
            // Render chat items
            sortedSessions.forEach(session => {
                const chatItem = createChatItem(session);
                chatList.appendChild(chatItem);
            });
        }

        // Create chat item element
        function createChatItem(session) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.dataset.sessionId = session.session_id;
            
            if (session.unread_count > 0) {
                div.classList.add('unread');
            }
            
            const timeAgo = getTimeAgo(new Date(session.last_message.created_at));
            const messagePreview = session.last_message.message.substring(0, 50) + 
                                 (session.last_message.message.length > 50 ? '...' : '');
            
            div.innerHTML = `
                <div class="chat-item-header">
                    <div class="d-flex align-items-center">
                        <span class="chat-item-status ${session.is_online ? 'online' : 'offline'}"></span>
                        <span class="chat-item-name">${session.customer_name || 'Anonymous'}</span>
                        ${session.unread_count > 0 ? `<span class="badge bg-warning ms-2">${session.unread_count}</span>` : ''}
                    </div>
                    <span class="chat-item-time">${timeAgo}</span>
                </div>
                <div class="chat-item-message">${messagePreview}</div>
            `;
            
            div.addEventListener('click', () => selectChat(session));
            
            return div;
        }

        // Select chat
        async function selectChat(session) {
            // Update UI
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-session-id="${session.session_id}"]`).classList.add('active');
            
            // Show chat interface
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chatInterface').style.display = 'flex';
            
            // Update chat header
            document.getElementById('chatCustomerName').textContent = session.customer_name || 'Anonymous';
            document.getElementById('chatCustomerEmail').textContent = session.customer_email || 'No email';
            
            // Set current chat
            currentChatId = session.session_id;
            currentSessionId = session.session_id;
            
            // Load chat history
            await loadChatHistory(session.session_id);
            
            // Mark messages as read
            markMessagesAsRead(session.session_id);
        }

        // Load chat history
        async function loadChatHistory(sessionId) {
            try {
                const response = await fetch(`/api/chat/history/${sessionId}/`);
                const data = await response.json();
                
                if (data.success) {
                    displayChatMessages(data.messages);
                    chatHistory[sessionId] = data.messages;
                }
            } catch (error) {
                console.error('Error loading chat history:', error);
            }
        }

        // Display chat messages
        function displayChatMessages(messages) {
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.innerHTML = '';
            
            messages.forEach(message => {
                addMessageToChat(message, false);
            });
            
            scrollToBottom();
        }

        // Add message to chat
        function addMessageToChat(message, animate = true) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.sender_type}`;
            
            const time = new Date(message.created_at).toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(message.message)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            
            if (animate) {
                messageDiv.style.animation = 'fadeIn 0.3s ease';
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            // Chat form
            document.getElementById('chatForm').addEventListener('submit', function(e) {
                e.preventDefault();
                sendMessage();
            });
            
            // Message input
            const messageInput = document.getElementById('messageInput');
            messageInput.addEventListener('input', function() {
                if (this.value.trim()) {
                    sendTypingIndicator(true);
                } else {
                    sendTypingIndicator(false);
                }
            });
            
            // Auto-resize textarea
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            });
            
            // Chat search
            document.getElementById('chatSearch').addEventListener('input', function() {
                filterChats(this.value);
            });
        }

        // Send message
        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }
            
            const messageData = {
                type: 'message',
                session_id: currentSessionId,
                message: message,
                sender_type: 'admin'
            };
            
            ws.send(JSON.stringify(messageData));
            
            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            // Stop typing indicator
            sendTypingIndicator(false);
        }

        // Send quick reply
        function sendQuickReply(message) {
            const messageInput = document.getElementById('messageInput');
            messageInput.value = message;
            sendMessage();
        }

        // Send typing indicator
        function sendTypingIndicator(isTyping) {
            if (!ws || ws.readyState !== WebSocket.OPEN || !currentSessionId) {
                return;
            }
            
            ws.send(JSON.stringify({
                type: 'typing',
                session_id: currentSessionId,
                is_typing: isTyping
            }));
        }

        // Mark messages as read
        async function markMessagesAsRead(sessionId) {
            try {
                await fetch(`/api/chat/mark-read/${sessionId}/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken')
                    }
                });
                
                // Update UI
                const chatItem = document.querySelector(`[data-session-id="${sessionId}"]`);
                if (chatItem) {
                    chatItem.classList.remove('unread');
                    const badge = chatItem.querySelector('.badge');
                    if (badge) {
                        badge.remove();
                    }
                }
                
            } catch (error) {
                console.error('Error marking messages as read:', error);
            }
        }

        // Update connection status
        function updateConnectionStatus(status) {
            const statusElement = document.getElementById('connectionStatus');
            
            statusElement.className = `connection-status ${status}`;
            
            switch (status) {
                case 'connected':
                    statusElement.innerHTML = '<i class="bi bi-check-circle me-2"></i>Connected';
                    break;
                case 'connecting':
                    statusElement.innerHTML = '<i class="bi bi-arrow-repeat me-2"></i>Connecting...';
                    break;
                case 'disconnected':
                    statusElement.innerHTML = '<i class="bi bi-x-circle me-2"></i>Disconnected';
                    break;
            }
        }

        // Update active chats count
        function updateActiveChatsCount(count) {
            document.getElementById('activeChatsCount').textContent = `${count} Active`;
        }

        // Filter chats
        function filterChats(searchTerm) {
            const chatItems = document.querySelectorAll('.chat-item');
            const term = searchTerm.toLowerCase();
            
            chatItems.forEach(item => {
                const name = item.querySelector('.chat-item-name').textContent.toLowerCase();
                const message = item.querySelector('.chat-item-message').textContent.toLowerCase();
                
                if (name.includes(term) || message.includes(term)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // Transfer chat
        function transferChat() {
            if (!currentSessionId) return;
            
            // This would open a modal to select another admin
            alert('Chat transfer functionality would be implemented here');
        }

        // End chat
        function endChat() {
            if (!currentSessionId) return;
            
            if (confirm('Are you sure you want to end this chat?')) {
                // Send end chat message
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'end_chat',
                        session_id: currentSessionId
                    }));
                }
                
                // Reset UI
                currentChatId = null;
                currentSessionId = null;
                document.getElementById('emptyState').style.display = 'flex';
                document.getElementById('chatInterface').style.display = 'none';
                
                // Reload chat list
                loadChatList();
            }
        }

        // Scroll to bottom
        function scrollToBottom() {
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Utility functions
        function getTimeAgo(date) {
            const now = new Date();
            const diffInSeconds = Math.floor((now - date) / 1000);
            
            if (diffInSeconds < 60) return 'Just now';
            if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)}m ago`;
            if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)}h ago`;
            if (diffInSeconds < 604800) return `${Math.floor(diffInSeconds / 86400)}d ago`;
            
            return date.toLocaleDateString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
