{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ZetuMart</title>
    <meta name="description" content="Login to your ZetuMart account">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #FF6B35;
            --primary-dark: #E55A2B;
            --secondary-color: #2C3E50;
            --success-color: #27AE60;
            --light-gray: #F8F9FA;
            --medium-gray: #E9ECEF;
            --dark-gray: #6C757D;
            --border-radius: 12px;
        }


        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }


        .login-container {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            margin: 2rem;
        }


        .login-row {
            display: flex;
            min-height: 500px;
        }


        .login-image {
            flex: 1;
            background: url('{% static "assets/img/1.jpg" %}') center/cover;
            position: relative;
        }


        .login-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 107, 53, 0.8);
        }


        .login-form-container {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }


        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }


        .login-logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }


        .login-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
        }


        .login-subtitle {
            color: var(--dark-gray);
            font-size: 0.9rem;
        }


        .form-floating {
            margin-bottom: 1.5rem;
        }


        .form-control {
            border: 2px solid var(--medium-gray);
            border-radius: 8px;
            padding: 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }


        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }


        .btn-login {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 1rem;
        }


        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.3);
        }


        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }


        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--medium-gray);
        }


        .divider span {
            background: white;
            padding: 0 1rem;
            color: var(--dark-gray);
            font-size: 0.9rem;
        }


        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }


        .social-btn {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid var(--medium-gray);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }


        .social-btn:hover {
            border-color: var(--primary-color);
            background: var(--light-gray);
        }


        .register-link {
            text-align: center;
            color: var(--dark-gray);
        }


        .register-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }


        .register-link a:hover {
            color: var(--primary-dark);
        }


        @media (max-width: 768px) {
            .login-row {
                flex-direction: column;
            }


            .login-image {
                height: 200px;
            }


            .login-form-container {
                padding: 2rem;
            }

            .back-button-container {
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 1000;
            }

            .btn-back {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                background: #007bff;
                color: white;
                padding: 12px 20px;
                border-radius: 25px;
                text-decoration: none;
                font-weight: 600;
                font-size: 16px;
                box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
                transition: all 0.3s ease;
                border: 2px solid #0056b3;
            }

            .btn-back:hover {
                background: #0056b3;
                color: white;
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
                border-color: #004085;
            }
        }
    </style>
</head>
<body>
    <!-- Back Button -->
    <div class="back-button-container">
        <a href="{% url 'index' %}" class="btn-back">
            <i class="fas fa-arrow-left"></i>
            Back
        </a>
    </div>

    <div class="login-container">
        <div class="login-row">
            <div class="login-image"></div>
            <div class="login-form-container">
                <div class="login-header">
                    <div class="login-logo">ZetuMart</div>
                    <h2 class="login-title">Welcome Back</h2>
                    <p class="login-subtitle">Login to access your account</p>
                </div>


                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Username or Email" required>
                        <label for="username">Username or Email</label>
                    </div>


                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                        <label for="password">Password</label>
                    </div>


                    <div class="d-flex justify-content-between mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label" for="remember">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-decoration-none">Forgot password?</a>
                    </div>


                    <button type="submit" class="btn-login">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Sign In
                    </button>
                </form>


                <div class="divider">
                    <span>OR</span>
                </div>


                <div class="social-login">
                    <button class="social-btn">
                        <i class="bi bi-google"></i>
                        Google
                    </button>
                    <button class="social-btn">
                        <i class="bi bi-facebook"></i>
                        Facebook
                    </button>
                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
